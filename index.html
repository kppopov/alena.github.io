<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@alenopova</title>
    <meta name="description" content="Елена Попова — контент-креатор. Консультации по соцсетям, коллаборации, AMEX-ссылки для друзей.">
    <meta property="og:title" content="@alenopova">
    <meta property="og:description" content="Контент-креатор · Консультации по соцсетям · Коллаборации">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%91%8B%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="home">

<!-- Decorative animated blobs -->
<div class="blob blob-1" aria-hidden="true"></div>
<div class="blob blob-2" aria-hidden="true"></div>
<div class="blob blob-3" aria-hidden="true"></div>

<main class="container">

    <!-- ===== Profile (populated from content/profile.json) ===== -->
    <section class="profile">
        <div class="avatar-wrap">
            <img class="avatar"
                 data-field="profile.avatar"
                 src="assets/avatar.jpg"
                 alt="Alena Popova"
                 onerror="this.style.visibility='hidden'">
            <span class="wave" aria-hidden="true">👋</span>
        </div>
        <h1 data-field="profile.name">@alenopova</h1>
        <p class="bio" data-field="profile.bio">Контент-креатор · Nürnberg, DE</p>

        <!-- Social row -->
        <nav class="socials" aria-label="Соцсети" data-field="profile.socials"></nav>
    </section>

    <!-- ===== Link cards (populated from content/links.json) ===== -->
    <section class="links" aria-label="Ссылки" data-field="links"></section>

</main>

<footer class="site-footer">
    <p>© 2026 Elena Popova · Made with ♥</p>
</footer>

<script src="assets/render.js"></script>

</body>
</html>
